name: Deploy Sync2Dine backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SYNC2DINE_BACKEND_DIR: /var/www/vhosts/sync2dine.io/sync2dine-backend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS secrets present
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "host_len=${#VPS_HOST} user_len=${#VPS_USER} key_len=${#VPS_SSH_KEY}"
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing VPS_HOST / VPS_USER / VPS_SSH_KEY GitHub secrets — cannot SSH to live API"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: .
          target: ${{ env.SYNC2DINE_BACKEND_DIR }}

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BE="/var/www/vhosts/sync2dine.io/sync2dine-backend"
            cd "$BE"
            # Backend master is SoT for phone/AI (server/phone, server/ai, …).
            # Do NOT curl frontend legacy server/*.ts onto this tree — that overwrites
            # re-export stubs and breaks domain folders after the navigability regroup.
            test -f server/phone/sally-sales-phone.ts
            test -f server/ai/orchestrator-prompt.ts
            test -f server/brains/index.ts
            grep -n "VOICE & HUMOUR" server/phone/sally-sales-phone.ts | head -5 || true
            test -f server/phone/vapi-routes.ts
            test -f server/sally/web-chat.ts
            test -f server/orders/orders-routes.ts
            npm ci --omit=dev
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart sync2dine-backend || pm2 start "npm run start" --name sync2dine-backend
            else
              pkill -f 'sync2dine.io/sync2dine-backend.*server/index.ts' || true
              sleep 2
              nohup /opt/plesk/node/24/bin/node \
                --require ./node_modules/tsx/dist/preflight.cjs \
                --import file://$BE/node_modules/tsx/dist/loader.mjs \
                --env-file=.env server/index.ts \
                >/tmp/sync2dine-api.log 2>&1 &
              sleep 5
            fi
            curl -sS --max-time 10 https://app.sync2dine.io/health || true
            echo
            curl -sS --max-time 60 -X POST https://app.sync2dine.io/api/sally/web \
              -H 'Content-Type: application/json' \
              -H 'Origin: https://sync2dine.io' \
              -d '{"sessionId":"web_cockney_be","text":"Who are you then?","page":"/"}' | head -c 900
            echo
