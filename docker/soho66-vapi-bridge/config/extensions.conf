[from-soho66]
; Near-silence kickstarts Soho66 RTP (no loud beep). Then Vapi/Lizzie.
exten => _X.,1,NoOp(Soho66 inbound: ${CALLERID(num)} -> ${EXTEN})
 same => n,Answer()
 same => n,Playback(silence/1)
 same => n,Dial(PJSIP/ai-platform/sip:${VAPI_INBOUND_USER}@${AI_SIP_HOST},120)
 same => n,Hangup()

exten => s,1,NoOp(Soho66 inbound s: ${CALLERID(num)})
 same => n,Answer()
 same => n,Playback(silence/1)
 same => n,Dial(PJSIP/ai-platform/sip:${VAPI_INBOUND_USER}@${AI_SIP_HOST},120)
 same => n,Hangup()

[to-ai]
exten => _X.,1,Hangup()
